  <style>
    html {
      /* 100dvh = dynamic viewport height, 키보드와 무관하게 초기 viewport 높이 유지 */
      height: 100dvh;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      height: 100dvh;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      /* iOS 터치 딜레이 및 스크롤 바운스 방지 */
      touch-action: none;
      -ms-touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    flt-glass-pane {
      /* Flutter 캔버스를 키보드와 무관하게 전체 높이로 고정 */
      height: 100dvh !important;
      width: 100% !important;
    }

    /* iOS 폰트 크기 자동 조절 방지 */
    input, textarea {
      font-size: 16px !important;
    }
  </style>
</head>
<body>
  <!-- Fix for RawKeyboard null safety issue in Flutter Web -->
  <script>
    (function() {
      // Patch KeyboardEvent prototype to ensure boolean properties are never null
      const originalRepeatGetter = Object.getOwnPropertyDescriptor(KeyboardEvent.prototype, 'repeat')?.get;
      const originalIsComposingGetter = Object.getOwnPropertyDescriptor(KeyboardEvent.prototype, 'isComposing')?.get;

      // Override repeat getter
      if (originalRepeatGetter) {
        Object.defineProperty(KeyboardEvent.prototype, 'repeat', {
          get: function() {
            const value = originalRepeatGetter.call(this);
            return value === null || value === undefined ? false : value;
          },
          configurable: true,
          enumerable: true
        });
      }

      // Override isComposing getter
      if (originalIsComposingGetter) {
        Object.defineProperty(KeyboardEvent.prototype, 'isComposing', {
          get: function() {
            const value = originalIsComposingGetter.call(this);
            return value === null || value === undefined ? false : value;
          },
          configurable: true,
          enumerable: true
        });
      }

      // Fallback: Also intercept events as they bubble
      const patchEvent = function(event) {
        if (event.repeat === null || event.repeat === undefined) {
          try {
            Object.defineProperty(event, 'repeat', {
              value: false,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // Ignore if property is not configurable
          }
        }
        if (event.isComposing === null || event.isComposing === undefined) {
          try {
            Object.defineProperty(event, 'isComposing', {
              value: false,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // Ignore if property is not configurable
          }
        }
      };

      window.addEventListener('keydown', patchEvent, true);
      window.addEventListener('keyup', patchEvent, true);
      window.addEventListener('keypress', patchEvent, true);
    })();

    // Fix: keyboard causes Flutter physicalSize to shrink on Android Chrome.
    // Flutter engine uses ResizeObserver on flt-glass-pane to detect size changes.
    // Intercept ResizeObserver to filter out keyboard-caused height reductions.
    var _fullHeight = window.innerHeight;
    var _fullWidth  = window.innerWidth;

    var _OriginalResizeObserver = window.ResizeObserver;
    window.ResizeObserver = function(callback) {
      var filteredCallback = function(entries, observer) {
        var filtered = entries.map(function(entry) {
          var h = entry.contentRect ? entry.contentRect.height : 0;
          // If height decreased significantly (keyboard), report full height instead
          if (h > 0 && h < _fullHeight * 0.9) {
            // Create a fake entry with full height
            var fakeRect = {
              x: entry.contentRect.x,
              y: entry.contentRect.y,
              width: entry.contentRect.width,
              height: _fullHeight,
              top: entry.contentRect.top,
              left: entry.contentRect.left,
              bottom: _fullHeight,
              right: entry.contentRect.right,
            };
            return {
              target: entry.target,
              contentRect: fakeRect,
              borderBoxSize: entry.borderBoxSize,
              contentBoxSize: entry.contentBoxSize,
              devicePixelContentBoxSize: entry.devicePixelContentBoxSize,
            };
          }
          return entry;
        });
        callback(filtered, observer);
      };
      return new _OriginalResizeObserver(filteredCallback);
    };
    window.ResizeObserver.prototype = _OriginalResizeObserver.prototype;

    // Orientation change → update full size
    window.addEventListener('resize', function() {
      var newW = window.outerWidth;
      if (Math.abs(newW - _fullWidth) > 50) {
        _fullHeight = window.outerHeight || screen.availHeight;
        _fullWidth  = newW;
      }
    });

    // DEBUG: 화면 좌상단에 viewport 높이 실시간 표시 (확인 후 삭제)
    var _dbgEl = document.createElement('div');
    _dbgEl.style.cssText = 'position:fixed;top:0;left:0;z-index:99999;background:rgba(0,0,0,0.75);color:lime;font-size:12px;padding:3px 8px;pointer-events:none;font-family:monospace;';
    document.body.appendChild(_dbgEl);
    setInterval(function() {
      var vv = window.visualViewport ? Math.round(window.visualViewport.height) : 'N/A';
      var iH = Math.round(window.innerHeight);
      _dbgEl.textContent = 'vv:' + vv + ' iH:' + iH;
    }, 200);
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
